# nginx enforcement of the open-mobile + anti-bot rules for HTTPS/443.
#
# WHY: on port 443 the User-Agent and request headers live inside the TLS-
# encrypted stream, which the packet firewall cannot read. nginx terminates TLS
# and CAN, so the device + bot checks for 443 live here. The C++ firewall still
# does the geo + datacenter-ASN gate for 443 (outsiders/datacenter IPs never
# reach nginx).
#
# Requires the GeoIP2 module: https://github.com/leev/ngx_http_geoip2_module
#   Debian/Ubuntu:  apt install libnginx-mod-http-geoip2
#
# ---------------------------------------------------------------------------
# 1) MAIN context (top of nginx.conf), if not auto-loaded:
#       load_module modules/ngx_http_geoip2_module.so;
# 2) HTTP context: paste the geoip2 + map + limit_req_zone blocks below.
# 3) Inside each TLS server{} block: paste the guard at the bottom.
# ---------------------------------------------------------------------------

# ===================== HTTP context =====================

# Country + ASN org of the client (defence in depth; firewall already gates).
geoip2 /usr/share/GeoIP/GeoLite2-Country.mmdb {
    $geoip2_country_iso source=$remote_addr country iso_code;
}
geoip2 /usr/share/GeoIP/GeoLite2-ASN.mmdb {
    $webup_asn_org source=$remote_addr autonomous_system_organization;
}

# Device + bot signals from the User-Agent (mirror firewall.conf).
map $http_user_agent $webup_mobile {
    default 0;
    "~*(Mobile|Android|iPhone|iPod|Windows Phone|webOS|BlackBerry|Opera Mini|IEMobile)" 1;
}
map $http_user_agent $webup_bot {
    default 0;
    "~*(bot|crawl|spider|scrap|slurp|curl|wget|python-?requests|python-?urllib|libwww|http[-_]?client|go-http-client|java/|headless|phantom|selenium|puppeteer|playwright|axios|node-fetch|okhttp|httpie|aiohttp|guzzle|postman)" 1;
}
map $http_user_agent $webup_inapp {
    default 0;
    "~(Instagram|FBAN|FBAV|FB_IAB|FBIOS|Line/|Snapchat|musical_ly|CriOS|FxiOS|EdgiOS|GSA/)" 1;
}

# Required browser headers (empty value => header absent => bot).
map $http_accept          $webup_has_accept    { default 1; "" 0; }
map $http_accept_encoding $webup_has_acceptenc { default 1; "" 0; }

# Block hosting/cloud/VPN networks by ASN org name.
map $webup_asn_org $webup_datacenter {
    default 0;
    "~*(amazon|aws|google|cloud|azure|microsoft|ovh|hetzner|digitalocean|linode|akamai|fastly|cloudflare|vultr|scaleway|leaseweb|contabo|alibaba|aliyun|tencent|oracle|choopa|m247|datacamp|colo|hosting|datacenter|data center|dedicated|vpn|proxy)" 1;
}

# Final allow/deny. Flags concatenated as  mobile|bot|inapp|hasAccept|hasAcceptEnc.
#   allow if (mobile AND not-bot AND both headers)  OR  (in-app browser AND both headers)
map "$webup_mobile$webup_bot$webup_inapp$webup_has_accept$webup_has_acceptenc" $webup_block {
    default   1;
    "~^10.11$" 0;   # mobile, not a bot, Accept + Accept-Encoding present
    "~^..111$" 0;   # in-app browser (IG/FB/TG...) with both headers present
}

# Per-IP rate limit. Keep generous: Indian mobile carriers use CGNAT (many real
# users behind one IP).
limit_req_zone $binary_remote_addr zone=webup:20m rate=20r/s;

# ===================== per-server guard =====================
# Paste near the top of your `server { listen 443 ssl; ... }` block:
#
#   if ($geoip2_country_iso != IN) { return 403; }   # geo (defence in depth)
#   if ($webup_datacenter)         { return 403; }   # hosting/cloud/VPN
#   if ($webup_block)              { return 403; }    # not a real mobile browser
#   limit_req zone=webup burst=100 nodelay;          # volumetric backstop
#
# (To switch to app-only mode later, add a token check:
#   map $http_user_agent $webup_token { default 0; "~YOUR-SECRET-TOKEN" 1; }
#   if ($webup_token = 0) { return 403; }  )
