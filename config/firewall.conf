# WebUp firewall daemon configuration.
# Lines are key=value. '#' starts a comment.

# --- NFQUEUE / kernel glue (must match scripts/setup-nftables.sh) ---
base_queue            = 0
num_queues            = 4          # worker threads = queues; matches NUM_QUEUES in the nft script
mark_approved         = 1
mark_rejected         = 2

# --- High-load tuning ---
# Packets the KERNEL buffers per queue before dropping (fail-closed) when a
# worker briefly lags. Kernel default is only 1024 -- a burst overruns it
# instantly. Raise for spiky traffic (costs ~packet_size * this per queue).
queue_maxlen          = 8192
# Netlink receive-buffer per worker, in bytes. Bigger = more burst headroom
# before ENOBUFS. Set num_queues ~= nproc so flows spread across all cores.
recv_buffer_bytes     = 8388608    # 8 MiB

# --- GeoIP ---
# Download GeoLite2-Country.mmdb + GeoLite2-ASN.mmdb from MaxMind (free).
geoip_db              = /usr/share/GeoIP/GeoLite2-Country.mmdb
home_country          = IN         # "inside" country (ISO alpha-2); everything else blocked
treat_unknown_as_home = false      # un-geolocatable IPs -> treated as outside (blocked)

# --- Web ports ---
http_port             = 80
https_port            = 443

# --- Who may use the website (device gate) ---
# Allow genuine MOBILE browsers only (incl. Telegram/Instagram/Facebook in-app
# browsers). Desktop browsers are blocked.
require_mobile        = true
mobile_regex          = (Mobile|Android|iPhone|iPod|Windows Phone|webOS|BlackBerry|Opera Mini|IEMobile)

# Secret token in the User-Agent. EMPTY = open to all mobile browsers (your
# choice: no friction, no challenge). Set a long random value ONLY if you want
# app-only access (your app injects it) -- that blocks normal mobile browsers.
ua_token              =

# --- Custom User-Agent ALLOWLIST mode ---
# When either of these is set, ONLY requests whose User-Agent matches your list
# are allowed on web ports; the mobile/bot/required-header heuristics are
# bypassed (geo + datacenter-ASN gates still apply). Use this for "only my own
# custom clients may connect".
#   allowed_ua_file : a file with one custom User-Agent per line; a request is
#                     allowed if its UA CONTAINS any line (case-sensitive).
#   allowed_ua_regex: an inline case-sensitive regex alternative, e.g.
#                     (MyApp/[0-9.]+|SecretAgent-X|Partner-Client-42)
allowed_ua_file       =
allowed_ua_regex      =

# --- Anti-bot: block hosting/cloud/VPN networks on web ports ---
# Real users are on mobile/residential ISPs; bots live in datacenters.
asn_db                = /usr/share/GeoIP/GeoLite2-ASN.mmdb
block_datacenter      = true
blocked_asn_file      =            # optional extra ASN denylist file
datacenter_org_regex  = (amazon|aws|google|cloud|azure|microsoft|ovh|hetzner|digitalocean|linode|akamai|fastly|cloudflare|vultr|scaleway|leaseweb|contabo|alibaba|aliyun|tencent|oracle|choopa|m247|datacamp|colo|hosting|datacenter|data center|dedicated|vpn|proxy)

# --- Anti-bot: HTTP heuristics (HTTP/80; nginx mirrors them for 443) ---
required_headers      = accept,accept-encoding
bot_ua_regex          = (bot|crawl|spider|scrap|slurp|curl|wget|python-?requests|python-?urllib|libwww|http[-_]?client|go-http-client|java/|headless|phantom|selenium|puppeteer|playwright|axios|node-fetch|okhttp|httpie|aiohttp|guzzle|postman)
inapp_allow_regex     = (Instagram|FBAN|FBAV|FB_IAB|FBIOS|Line/|Snapchat|musical_ly|CriOS|FxiOS|EdgiOS|GSA/)

# --- Limits ---
max_inspect_bytes     = 8192       # max request bytes read before deciding
http_idle_timeout_s   = 15         # drop half-open HTTP/80 with no request (slow-loris)
max_http_conns        = 65536      # pending HTTP/80 flows per worker (flood guard)

# --- Observability ---
verbose               = false      # log every decision (rate-limited below)
log_rate_per_sec      = 50         # max decision log lines/sec/worker (0 = unlimited)
stats_interval_s      = 300        # periodic counter dump to journal (0 = off; SIGUSR1 also dumps)
